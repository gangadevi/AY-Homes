<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <link rel="stylesheet" href="styles/style.css" />

</head>

<body>
    <div id="header"></div>

    <section class="contact-hero-section">
    <div class="container position-relative">
      <div class="row align-items-center min-vh-100">
        <div class="col-lg-6 text-content pt-5 pt-lg-7 pb-5 pb-lg-7 ">
          <h1 data-aos="zoom-in" data-aos-delay="100">
            CONTACT US
          </h1>
          <div class="gold-line" data-aos="zoom-in" data-aos-delay="200"></div>
        </div>


        <div class="col-lg-6"></div>
      </div>
    </div>
  </section>


  <!-- Contact Information -->

<section class="contact-section py-5">
    <div class="container">
        <div class="row align-items-center g-5">

            <!-- Left Column -->
            <div class="col-lg-5">
                <h2 class="cinzel-font mb-4">Get In Touch</h2>
                <p class="mb-4">
                    We'd love to hear from you. Reach out to us for project details,
                    site visits, or any enquiries.
                </p>

                <div class="contact-item d-flex mb-4">
                    <div class="contact-icon">
                        <i class="bi bi-geo-alt-fill"></i>
                    </div>
                    <div>
                        <h5>Corporate Office</h5>
                        <p class="mb-0">
                            7, Old Madras Rd, <br> Sannatammanahalli, Huskur, <br> Bengaluru, Karnataka 560049,<br> India
                        </p>
                    </div>
                </div>

                <div class="contact-item d-flex mb-4">
                    <div class="contact-icon">
                        <i class="bi bi-telephone-fill"></i>
                    </div>
                    <div>
                        <h5>Phone</h5>
                        <a href="tel:+919876543210">+91 99162 91455</a>
                    </div>
                </div>

                <div class="contact-item d-flex mb-4">
                    <div class="contact-icon">
                        <i class="bi bi-envelope-fill"></i>
                    </div>
                    <div>
                        <h5>Email</h5>
                        <a href="mailto:info@yourcompany.com">
                            info@yourcompany.com
                        </a>
                    </div>
                </div>

                <div class="mt-4">
                    <h5 class="mb-3">Follow Us</h5>

                    <div class="social-icons">
                        <a href="#"><i class="bi bi-facebook"></i></a>
                        <a href="#"><i class="bi bi-instagram"></i></a>
                        <a href="#"><i class="bi bi-linkedin"></i></a>
                        <a href="#"><i class="bi bi-youtube"></i></a>
                    </div>
                </div>

            </div>

            <!-- Right Column -->
            <div class="col-lg-7">
                <div class="map-wrapper">
                    <iframe
                        src="https://maps.google.com/maps?q=Orion%20Uptown%20Mall,%20Huskur,%20Bengaluru&t=&z=15&ie=UTF8&iwloc=B&output=embed"
                        width="100%"
                        height="500"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy">
                    </iframe>
                </div>
            </div>

        </div>
    </div>
</section>


    <div id="footer"></div>
    <script src="./js/index.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1200,
            easing: 'ease-in-out',
            once: false,
            mirror: true
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
